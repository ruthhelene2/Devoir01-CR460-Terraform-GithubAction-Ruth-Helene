name: 'Terraform Automation'
 
on:
  push:
    branches: [ "main" ]
 
env:
  # Arrimage à Terraform Cloud (pour le stockage de l'état)
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
  # Identifiants Azure (utilisés localement par GitHub pour l'authentification)
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  # Variables d'application (Injection dans Terraform)
  TF_VAR_tp_api_token: ${{ secrets.TP_API_TOKEN }}
  # Ici, on peut utiliser des chaînes de caractères simples ou des secrets
  TF_VAR_resource_group_name: "rg-Poly-Cyber-CR460-Dev01"
  TF_VAR_location: "canadacentral"
 
jobs:
  deploy:
    name: 'Deploy Infrastructure'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false # Recommandé pour éviter des problèmes de formatage de sortie
 
      - name: Terraform Init
        working-directory: ./Infrastructure
        run: terraform init
 
      - name: Terraform Plan
        working-directory: ./Infrastructure
        run: terraform plan
 
      - name: Terraform Apply
        working-directory: ./Infrastructure
        run: terraform apply -auto-approve
